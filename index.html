<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <meta name="description" content="h2m is a lightweight offline HTML-to-Markdown converter." />

    <meta name="theme-color" content="#f7f4ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#151515" media="(prefers-color-scheme: dark)" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>h2m — HTML to Markdown</title>
  </head>

  <body>
    <noscript>
      <p>h2m requires JavaScript to convert HTML into Markdown.</p>
    </noscript>

    <main id="app" aria-label="h2m application">
      <section class="boot-shell" aria-live="polite">
        <p class="boot-shell__mark">h2m</p>
        <h1 class="boot-shell__title">HTML to Markdown</h1>
        <p class="boot-shell__note">Preparing the editor…</p>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
